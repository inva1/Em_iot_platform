# ── IoT Platform Docker Compose ──────────────────────────────────────────────
# Services: Kafka (KRaft), InfluxDB 2.x, PubSub Broker + Query API
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose logs -f broker # follow broker logs
#   docker compose down           # stop all
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Apache Kafka (KRaft mode — no Zookeeper) ─────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    container_name: iot-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode (no Zookeeper required)
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # Topic defaults
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_NUM_PARTITIONS=3
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── InfluxDB 2.x ────────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: iot-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-admin12345}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-iot-platform}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-telemetry}
      - DOCKER_INFLUXDB_INIT_RETENTION=${INFLUXDB_RETENTION:-720h}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-my-super-secret-token}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PubSub Broker + Query API ──────────────────────────────────────────
  broker:
    build:
      context: ./PubSub_Server
      dockerfile: Dockerfile
    container_name: iot-broker
    ports:
      - "9000:9000"    # TCP broker (devices connect here)
      - "8080:8080"    # Query API (dashboard/app queries here)
    environment:
      - BROKER_HOST=0.0.0.0
      - BROKER_PORT=9000
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-my-super-secret-token}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-iot-platform}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-telemetry}
      - API_HOST=0.0.0.0
      - API_PORT=8080
      - STUB_AUTH=true
      - LOG_LEVEL=INFO
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kafka_data:
    driver: local
  influxdb_data:
    driver: local
  influxdb_config:
    driver: local
